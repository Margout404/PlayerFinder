services:
  mysql:
    image: mysql:8.0
    container_name: playerfinder-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: playerfinder
      MYSQL_USER: player
      MYSQL_PASSWORD: player123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
